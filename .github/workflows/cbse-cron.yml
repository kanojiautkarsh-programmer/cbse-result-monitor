name: CBSE Result Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CBSE Update Check
        run: |
          curl -X POST "${{ secrets.CBSE_CRON_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CBSE_CRON_SECRET }}"
